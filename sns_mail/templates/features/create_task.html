{% extends "base.html" %}

{% block title %}Create Task - SNS Mail{% endblock %}

{% block content %}
<div class="row">
    <div class="col-12">
        <h2 class="mb-4">
            <i class="fas fa-plus-circle text-primary"></i>
            Create New Task
        </h2>
    </div>
</div>

<div class="row">
    <div class="col-md-8">
        <div class="card">
            <div class="card-body">
                <form action="{{ url_for('features.create_task') }}" method="POST">
                    <div class="mb-3">
                        <label class="form-label">Task Title *</label>
                        <input type="text" name="title" class="form-control" required placeholder="Enter task title">
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Description</label>
                        <textarea name="description" class="form-control" rows="4" placeholder="Add task details..."></textarea>
                    </div>
                    
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Priority</label>
                            <select name="priority" class="form-select">
                                <option value="low">Low</option>
                                <option value="medium" selected>Medium</option>
                                <option value="high">High</option>
                                <option value="urgent">Urgent</option>
                            </select>
                        </div>
                        
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Due Date</label>
                            <input type="datetime-local" name="due_date" class="form-control">
                        </div>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Link to Email (Optional)</label>
                        <input type="number" name="email_id" class="form-control" placeholder="Email ID">
                    </div>
                    
                    <div class="d-flex justify-content-between">
                        <a href="{{ url_for('features.tasks') }}" class="btn btn-secondary">
                            <i class="fas fa-arrow-left"></i> Back
                        </a>
                        <button type="submit" class="btn btn-primary">
                            <i class="fas fa-check"></i> Create Task
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
    
    <div class="col-md-4">
        <div class="card bg-light">
            <div class="card-body">
                <h5><i class="fas fa-lightbulb text-warning"></i> Tips</h5>
                <ul class="list-unstyled">
                    <li class="mb-2"><i class="fas fa-check text-success"></i> Be specific with task titles</li>
                    <li class="mb-2"><i class="fas fa-check text-success"></i> Set realistic due dates</li>
                    <li class="mb-2"><i class="fas fa-check text-success"></i> Use priority wisely</li>
                    <li class="mb-2"><i class="fas fa-check text-success"></i> Link emails for context</li>
                </ul>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% extends "base.html" %}

{% block title %}Performance Monitoring - SNS Mail{% endblock %}

{% block content %}
<div class="row">
    <div class="col-12">
        <h2 class="mb-4">
            <i class="fas fa-tachometer-alt text-primary"></i>
            Performance Monitoring
        </h2>
    </div>
</div>

<div class="row mb-4">
    <div class="col-md-3">
        <div class="card bg-primary text-white">
            <div class="card-body text-center">
                <h4>-</h4>
                <small>CPU Usage</small>
            </div>
        </div>
    </div>
    <div class="col-md-3">
        <div class="card bg-success text-white">
            <div class="card-body text-center">
                <h4>-</h4>
                <small>Memory Usage</small>
            </div>
        </div>
    </div>
    <div class="col-md-3">
        <div class="card bg-info text-white">
            <div class="card-body text-center">
                <h4>-</h4>
                <small>Disk Usage</small>
            </div>
        </div>
    </div>
    <div class="col-md-3">
        <div class="card bg-warning text-white">
            <div class="card-body text-center">
                <h4>-</h4>
                <small>Active Connections</small>
            </div>
        </div>
    </div>
</div>

<div class="card">
    <div class="card-header">
        <h5 class="mb-0">Performance Metrics</h5>
    </div>
    <div class="card-body">
        <p class="text-muted text-center">Performance monitoring data will be displayed here.</p>
    </div>
</div>
{% endblock %}

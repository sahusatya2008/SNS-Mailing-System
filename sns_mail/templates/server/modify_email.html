{% extends "base.html" %}

{% block title %}Modify Email - SNS Mail{% endblock %}

{% block content %}
<div class="row">
    <div class="col-12">
        <h2 class="mb-4">
            <i class="fas fa-edit text-primary"></i>
            Modify Email
        </h2>
    </div>
</div>

<div class="card">
    <div class="card-header">
        <h5 class="mb-0">Edit Email ID: {{ email.id }}</h5>
    </div>
    <div class="card-body">
        <form action="{{ url_for('server.modify_email', email_id=email.id) }}" method="POST">
            <div class="mb-3">
                <label class="form-label">Subject</label>
                <input type="text" name="subject" class="form-control" value="{{ email.subject }}" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Body</label>
                <textarea name="body" class="form-control" rows="10" required>{{ email.body }}</textarea>
            </div>
            <div class="mb-3">
                <p class="text-muted">
                    <strong>From:</strong> {{ email.sender.email }}<br>
                    <strong>To:</strong> {{ email.recipient.email }}
                </p>
            </div>
            <button type="submit" class="btn btn-warning">
                <i class="fas fa-save"></i> Save Changes
            </button>
            <a href="{{ url_for('server.email_server_actions', email_id=email.id) }}" class="btn btn-secondary">
                Cancel
            </a>
        </form>
    </div>
</div>
{% endblock %}

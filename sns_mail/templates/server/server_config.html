{% extends "base.html" %}

{% block title %}Server Configuration - SNS Mail{% endblock %}

{% block content %}
<div class="row">
    <div class="col-12">
        <h2 class="mb-4">
            <i class="fas fa-cogs text-primary"></i>
            Server Configuration
        </h2>
    </div>
</div>

<div class="card">
    <div class="card-header">
        <h5 class="mb-0">Server Settings</h5>
    </div>
    <div class="card-body">
        <form action="{{ url_for('server.update_server_config') }}" method="POST">
            <div class="row mb-3">
                <div class="col-md-6">
                    <label class="form-label">Server Name</label>
                    <input type="text" class="form-control" value="SNS Mail Server" disabled>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Domain</label>
                    <input type="text" class="form-control" value="@snsx.com" disabled>
                </div>
            </div>
            
            <div class="row mb-3">
                <div class="col-md-6">
                    <label class="form-label">Max Upload Size (MB)</label>
                    <input type="number" class="form-control" value="16" disabled>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Session Timeout (minutes)</label>
                    <input type="number" class="form-control" value="30" disabled>
                </div>
            </div>
            
            <div class="alert alert-info">
                <i class="fas fa-info-circle"></i>
                Server configuration is read-only. Modify the config.py file to change these values.
            </div>
        </form>
    </div>
</div>

<div class="card mt-4">
    <div class="card-header">
        <h5 class="mb-0">Security Configuration</h5>
    </div>
    <div class="card-body">
        <div class="row">
            <div class="col-md-6">
                <div class="form-check form-switch mb-3">
                    <input class="form-check-input" type="checkbox" id="ssl" checked disabled>
                    <label class="form-check-label" for="ssl">SSL/HTTPS Enabled</label>
                </div>
                <div class="form-check form-switch mb-3">
                    <input class="form-check-input" type="checkbox" id="virusScan" checked disabled>
                    <label class="form-check-label" for="virusScan">Virus Scanning</label>
                </div>
            </div>
            <div class="col-md-6">
                <div class="form-check form-switch mb-3">
                    <input class="form-check-input" type="checkbox" id="rateLimit" checked disabled>
                    <label class="form-check-label" for="rateLimit">Rate Limiting</label>
                </div>
                <div class="form-check form-switch mb-3">
                    <input class="form-check-input" type="checkbox" id="logging" checked disabled>
                    <label class="form-check-label" for="logging">Security Logging</label>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

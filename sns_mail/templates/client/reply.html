{% extends "base.html" %}

{% block title %}Reply - SNS Mail{% endblock %}

{% block content %}
<div class="row">
    <div class="col-12">
        <h2 class="mb-4">
            <i class="fas fa-reply text-primary"></i>
            Reply to Email
        </h2>
    </div>
</div>

<div class="row">
    <div class="col-lg-8">
        <div class="card">
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3">
                        <label for="recipient" class="form-label">To</label>
                        <input type="email" class="form-control" id="recipient" 
                               value="{{ original_email.sender.email }}" disabled>
                    </div>
                    
                    <div class="mb-3">
                        <label for="subject" class="form-label">Subject</label>
                        <input type="text" class="form-control" id="subject" name="subject" 
                               value="{{ reply_subject }}" required>
                    </div>
                    
                    <div class="mb-3">
                        <label for="body" class="form-label">Message</label>
                        <textarea class="form-control" id="body" name="body" rows="10" required>

---------- Original Message ----------
From: {{ original_email.sender.email }}
Date: {{ original_email.sent_at.strftime('%Y-%m-%d %H:%M') }}
Subject: {{ original_email.subject }}

{{ original_email.body }}</textarea>
                    </div>
                    
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary">
                            <i class="fas fa-paper-plane"></i> Send Reply
                        </button>
                        <a href="{{ url_for('client.view_email', email_id=original_email.id) }}" class="btn btn-secondary">
                            <i class="fas fa-times"></i> Cancel
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
    
    <div class="col-lg-4">
        <div class="card">
            <div class="card-header">
                <h5 class="mb-0">Original Email</h5>
            </div>
            <div class="card-body">
                <p><strong>From:</strong> {{ original_email.sender.email }}</p>
                <p><strong>Subject:</strong> {{ original_email.subject }}</p>
                <p><strong>Date:</strong> {{ original_email.sent_at.strftime('%Y-%m-%d %H:%M') }}</p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
